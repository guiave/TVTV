<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Player de Canais</title>
    <style>
        body{font-family:Arial,sans-serif;background:#1a1a1a;color:#fff;display:flex;flex-direction:column;align-items:center;padding:20px;margin:0}
        .container{width:100%;max-width:900px;text-align:center}
        .menu{margin-bottom:20px}
        button{padding:10px 20px;margin:5px;cursor:pointer;background:#007bff;border:none;color:#fff;border-radius:5px;font-weight:bold}
        button:hover,button:focus{background:#0056b3;outline:3px solid #fff}
        .player-wrapper{background:#000;border:2px solid #333;border-radius:8px;overflow:hidden}
        iframe{display:none}
        iframe.active{display:block}
    </style>
</head>
<body>
    <div class="container">
        <h1>Central de Transmissão</h1>
        <div class="menu">
            <button onclick="mostrarCanal('espn')">ESPN</button>
            <button onclick="mostrarCanal('disney')">Disney</button>
            <button onclick="mostrarCanal('premiere')">Premiere</button>
            <button onclick="mostrarCanal('premiere2')">Premiere 2</button>
            <button onclick="mostrarCanal('premiere3')">Premiere 3</button>
            <button onclick="mostrarCanal('premiere4')">Premiere 4</button>
            <button onclick="mostrarCanal('brasileiraoprime')">Prime Vídeo</button>
        </div>
        <div class="player-wrapper">
            <iframe id="espn" src="https://meuplayeronlinehd.com/myplay/watch.html?id=espn" allow="encrypted-media" allowfullscreen frameborder="0" width="100%" height="500"></iframe>
            <iframe id="disney" src="https://meuplayeronlinehd.com/myplay/watch.html?id=ds1" allow="encrypted-media" allowfullscreen frameborder="0" width="100%" height="500"></iframe>
            <iframe id="premiere" src="https://meuplayeronlinehd.com/myplay/watch.html?id=premiere" allow="encrypted-media" allowfullscreen frameborder="0" width="100%" height="500"></iframe>
            <iframe id="premiere2" src="https://meuplayeronlinehd.com/myplay/watch.html?id=premiere2" allow="encrypted-media" allowfullscreen frameborder="0" width="100%" height="500"></iframe>
            <iframe id="premiere3" src="https://meuplayeronlinehd.com/myplay/watch.html?id=premiere3" allow="encrypted-media" allowfullscreen frameborder="0" width="100%" height="500"></iframe>
            <iframe id="premiere4" src="https://meuplayeronlinehd.com/myplay/watch.html?id=premiere4" allow="encrypted-media" allowfullscreen frameborder="0" width="100%" height="500"></iframe>
            <iframe id="brasileiraoprime" src="https://meuplayeronlinehd.com/myplay/watch.html?id=brasileiraoprime" allow="encrypted-media" allowfullscreen frameborder="0" width="100%" height="500"></iframe>
        </div>
    </div>
    <script>
        var canais=['espn','disney','premiere','premiere2','premiere3','premiere4','brasileiraoprime'];
        function mostrarCanal(id){
            for(var i=0;i<canais.length;i++) document.getElementById(canais[i]).classList.remove('active');
            document.getElementById(id).classList.add('active');
        }
        window.onload=function(){mostrarCanal('espn')};
    </script>
</body>
</html>
