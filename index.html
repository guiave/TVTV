<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Player de Canais</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }
        .menu {
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background-color: #007bff;
            border: none;
            color: white;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .player-wrapper {
            background-color: #000;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        iframe {
            display: none; /* Esconde os players inicialmente */
        }
        iframe.active {
            display: block; /* Mostra apenas o player ativo */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Central de Transmissão</h1>
        
        <div class="menu">
            <button onclick="mostrarCanal('espn')">Assistir ESPN</button>
            <button onclick="mostrarCanal('disney')">Assistir Disney</button>
        </div>

        <div class="player-wrapper">
            <iframe id="espn" src="https://meuplayeronlinehd.com/myplay/watch.html?id=espn" 
                    allow="encrypted-media" allowfullscreen frameborder="0" width="100%" height="500"></iframe>
            
            <iframe id="disney" src="https://meuplayeronlinehd.com/myplay/watch.html?id=ds1" 
                    allow="encrypted-media" allowfullscreen frameborder="0" width="100%" height="500"></iframe>
        </div>
    </div>

    <script>
        function mostrarCanal(id) {
            // Esconde todos os iframes
            document.getElementById('espn').classList.remove('active');
            document.getElementById('disney').classList.remove('active');
            
            // Mostra apenas o selecionado
            document.getElementById(id).classList.add('active');
        }

        // Iniciar com a ESPN visível por padrão
        window.onload = () => mostrarCanal('espn');
    </script>

</body>
</html>
